

syntax = "proto3";


package kv;

service KVService{

	rpc Put(PutRequest)returns(PutReply){}
	rpc Get(GetRequest)returns(GetReply){}

}


message PutRequest{
	int32 id = 1;
	bytes command = 2;
	
}

message GetRequest{
	int32 id = 1;
	bytes command = 2;
}


message PutReply{
	int32 id = 1;
	int32 count = 2;
	int32 logSize = 3;
}

message GetReply{
	int32 id = 1;
	int32 count = 2;
	int32 logSize = 3;
	string value = 4;
}


